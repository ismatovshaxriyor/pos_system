services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${DB_NAME:-pos_local_db}
      - POSTGRES_USER=${DB_USER:-pos_user}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-pos_user} -d ${DB_NAME:-pos_local_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  db_backup:
    image: prodrigestivill/postgres-backup-local
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_DB=${DB_NAME:-pos_local_db}
      - POSTGRES_USER=${DB_USER:-pos_user}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - SCHEDULE=@daily
      - BACKUP_KEEP_DAYS=7
    volumes:
      - ./backups:/backups

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    image: ${POS_IMAGE:-ghcr.io/ORG/pos-local}:${RELEASE_CHANNEL:-stable}
    platform: linux/amd64
    # WebSocket (Django Channels) uchun ASGI server kerak - gunicorn+WSGI
    # WS ulanishlarni xizmat qila olmaydi. Daphne yagona-processli async,
    # bitta restoranning real yukiga (bir necha o'nlab xodim qurilmasi)
    # yetarli - sinxron DRF view'lar ASGI ostida sync_to_async thread pool
    # orqali baribir parallel ishlaydi.
    command: daphne -b 0.0.0.0 -p 8000 config.asgi:application
    env_file: .env
    environment:
      - RUN_MIGRATIONS=1
      - DB_HOST=db
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./keys:/app/keys:ro
      - media_data:/app/media
    ports:
      - "8000:8000"
    read_only: true
    tmpfs:
      - /tmp
      - /run
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  celery_worker:
    image: ${POS_IMAGE:-ghcr.io/ORG/pos-local}:${RELEASE_CHANNEL:-stable}
    platform: linux/amd64
    command: celery -A config worker --loglevel=info --concurrency=2
    env_file: .env
    environment:
      - DB_HOST=db
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./keys:/app/keys:ro
      - media_data:/app/media
    read_only: true
    tmpfs:
      - /tmp
      - /run
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_started
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  celery_beat:
    image: ${POS_IMAGE:-ghcr.io/ORG/pos-local}:${RELEASE_CHANNEL:-stable}
    platform: linux/amd64
    # --schedule /tmp'da bo'lishi shart: konteyner read_only, beat esa jadval
    # faylini (default: /app/celerybeat-schedule) yozib turadi - aks holda
    # boot'da crash. /tmp - tmpfs; restart'da yo'qolishi zararsiz, jadval
    # settings'dagi CELERY_BEAT_SCHEDULE'dan qayta quriladi.
    command: celery -A config beat --loglevel=info --schedule=/tmp/celerybeat-schedule
    env_file: .env
    environment:
      - DB_HOST=db
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./keys:/app/keys:ro
    read_only: true
    tmpfs:
      - /tmp
      - /run
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_started
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # Faqat ichki tarmoqda ishlaydi (port ochilmagan) - update_app buyrug'i
  # licensing.tasks orqali http://watchtower:8080/v1/update ga so'rov yuboradi.
  #
  # `containrrr/watchtower` emas: bu image 2023-11'dan beri yangilanmagan
  # (loyiha asosan tashlab qo'yilgan) va uning ichidagi Docker API client
  # eskirgan (v1.25) - zamonaviy Docker Engine (v1.40+ talab qiladi) bilan
  # "client version too old" xatosi bilan darhol yiqiladi (`restart:
  # unless-stopped` uni abadiy qayta-qayta yiqilib turishga majburlaydi -
  # HTTP API hech qachon ko'tarilmaydi). Jonli sinovda (mahalliy registry +
  # haqiqiy /v1/update chaqiruvi bilan) tasdiqlangan: `containrrr/watchtower`
  # bilan update_app butunlay ishlamaydi, `nickfedor/watchtower` (faol
  # qo'llab-quvvatlanadigan community fork, Docker API v1.55 bilan to'g'ri
  # ishlaydi) bilan esa web+celery_worker+celery_beat to'liq va toza qayta
  # yaratiladi.
  watchtower:
    image: nickfedor/watchtower:latest
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_HTTP_API_UPDATE=true
      - WATCHTOWER_HTTP_API_TOKEN=${WATCHTOWER_TOKEN}
      - WATCHTOWER_LABEL_ENABLE=true
      - WATCHTOWER_CLEANUP=true

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}

volumes:
  postgres_data:
  media_data:
