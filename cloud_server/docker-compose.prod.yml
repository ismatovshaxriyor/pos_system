services:
  db:
    image: postgres:15
    volumes:
      - cloud_postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${DB_NAME:-pos_cloud_db}
      - POSTGRES_USER=${DB_USER:-cloud_user}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-cloud_user} -d ${DB_NAME:-pos_cloud_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  db_backup:
    image: prodrigestivill/postgres-backup-local
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_DB=${DB_NAME:-pos_cloud_db}
      - POSTGRES_USER=${DB_USER:-cloud_user}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - SCHEDULE=@daily
      - BACKUP_KEEP_DAYS=14
    volumes:
      - ./backups:/backups

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8001 --workers 2
    env_file: .env
    environment:
      - RUN_MIGRATIONS=1
      - DB_HOST=db
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./keys:/app/keys:ro
      - media_data:/app/media
    ports:
      # 127.0.0.1 only - public traffic comes in through the cloudflared
      # tunnel below (Cloudflare terminates TLS at their edge), this port
      # stays reachable just for host-level debugging (curl over SSH).
      - "127.0.0.1:8001:8001"
    read_only: true
    tmpfs:
      - /tmp
      - /run
      - /root
      # entrypoint.sh har start'da `collectstatic` qiladi (whitenoise manifest
      # storage buni talab qiladi) va STATIC_ROOT=/app/staticfiles'ga yozadi -
      # read_only ildiz FS bilan bu joy yoziladigan bo'lishi shart.
      - /app/staticfiles
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/admin/login/')\" || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery_worker:
    build: .
    command: celery -A config worker --loglevel=info --concurrency=2
    env_file: .env
    environment:
      - DB_HOST=db
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./keys:/app/keys:ro
    read_only: true
    tmpfs:
      - /tmp
      - /run
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      - web
    restart: unless-stopped

  celery_beat:
    build: .
    # --schedule /tmp'da bo'lishi shart: konteyner read_only, beat esa jadval
    # faylini (default: /app/celerybeat-schedule) yozib turadi - aks holda
    # boot'da crash. /tmp - tmpfs; restart'da yo'qolishi zararsiz.
    command: celery -A config beat --loglevel=info --schedule=/tmp/celerybeat-schedule
    env_file: .env
    environment:
      - DB_HOST=db
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./keys:/app/keys:ro
    read_only: true
    tmpfs:
      - /tmp
      - /run
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      - web
    restart: unless-stopped

  # Ona serverni Cloudflare edge orqali ochadi - hech qanday port ochish
  # yoki DNS A-record'ni to'g'ridan-to'g'ri EC2 IP'ga bog'lash shart emas
  # (local_server'dagi Bola tunnel pattern bilan bir xil - docs/4).
  # SSL Cloudflare tomonida - bu instance sertifikat boshqarishi shart
  # emas. Ingress qoidasi (hamrohpos.uz -> http://website:80) Cloudflare
  # Zero Trust dashboardida sozlanadi, Nginx frontend va backend (web:8001) ni bog'laydi.
  website:
    build:
      context: ../website
      dockerfile: Dockerfile
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:80/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 15s
    depends_on:
      - web

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    env_file: .env
    entrypoint: ["/bin/sh", "-c", "exec cloudflared tunnel --no-autoupdate run --token \"$CLOUDFLARE_TUNNEL_TOKEN\""]

volumes:
  cloud_postgres_data:
  media_data:
