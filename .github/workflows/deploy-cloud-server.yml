name: Deploy cloud_server (Ona)

# cloud_server/** ostida biror narsa main'ga push qilinganda EC2'dagi
# production instansiyani yangilaydi - shu path filtri bo'lmasa,
# local_server'dagi o'zgarishlar ham kerak bo'lmagan deploy'ni
# ishga tushirar edi (ikkala loyiha mustaqil, CLAUDE.md'ga qarang).
on:
  push:
    branches: [main]
    paths:
      - "cloud_server/**"
      - ".github/workflows/deploy-cloud-server.yml"
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Start services and run tests
        run: |
          cd cloud_server
          docker compose -f docker-compose.yml up -d db redis
          sleep 10
          docker compose -f docker-compose.yml run --rm web python manage.py makemigrations --check --dry-run
          docker compose -f docker-compose.yml run --rm web python manage.py test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST || secrets.SERVER_HOST || secrets.HOST || secrets.SERVER_IP }}
          username: ${{ secrets.EC2_USER || secrets.SERVER_USER || secrets.USER || secrets.USERNAME }}
          password: ${{ secrets.EC2_PASSWORD || secrets.SERVER_PASSWORD || secrets.SSH_PASSWORD || secrets.PASSWORD }}
          key: ${{ secrets.EC2_SSH_KEY || secrets.SSH_KEY }}
          script: |
            set -e
            cd ~/pos_system/cloud_server
            # Diqqat: bu script SSH orqali oddiy shell'da ishlaydi - $$ bu
            # yerda compose-uslubidagi ekranlash EMAS, shell PID bo'lib
            # ochilib ketadi ($$(date ...) esa syntax error berib butun
            # deploy'ni to'xtatardi). POSTGRES_USER/POSTGRES_DB - db
            # konteynerining o'z env'i, host shell'da DB_USER yo'qligiga
            # bog'liq emas.
            if [ -n "$(docker compose -f docker-compose.prod.yml ps -q db)" ]; then
              mkdir -p backups
              docker compose -f docker-compose.prod.yml exec -T db sh -c 'pg_dump -U "$POSTGRES_USER" "$POSTGRES_DB"' > "backups/pre_deploy_backup_$(date +%F_%H%M%S).sql" || echo "Backup failed"
            fi
            cd ~/pos_system
            git fetch origin main
            git reset --hard origin/main
            cd cloud_server
            docker compose -f docker-compose.prod.yml up -d --build
            docker compose -f docker-compose.prod.yml restart cloudflared
            docker image prune -f
