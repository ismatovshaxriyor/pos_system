name: Deploy cloud_server (Ona)

# cloud_server/** ostida biror narsa main'ga push qilinganda EC2'dagi
# production instansiyani yangilaydi - shu path filtri bo'lmasa,
# local_server'dagi o'zgarishlar ham kerak bo'lmagan deploy'ni
# ishga tushirar edi (ikkala loyiha mustaqil, CLAUDE.md'ga qarang).
on:
  push:
    branches: [main]
    paths:
      - "cloud_server/**"
      - "website/**"
      - ".github/workflows/deploy-cloud-server.yml"
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Start services and run tests
        run: |
          cd cloud_server
          docker compose -f docker-compose.yml up -d db redis
          sleep 10
          docker compose -f docker-compose.yml run --rm web python manage.py makemigrations --check --dry-run
          docker compose -f docker-compose.yml run --rm web python manage.py test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST || secrets.SERVER_HOST }}
          username: ${{ secrets.EC2_USER || secrets.SERVER_USER }}
          key: ${{ secrets.EC2_SSH_KEY || secrets.SERVER_SSH_KEY }}
          password: ${{ secrets.EC2_PASSWORD || secrets.SERVER_PASSWORD }}
          script: |
            TARGET_DIR=""
            for dir in "$HOME/pos_system" "$HOME" "/root/pos_system" "/var/www/pos_system" "$(pwd)"; do
              if [ -d "$dir/cloud_server" ]; then
                TARGET_DIR="$dir"
                break
              fi
            done

            if [ -z "$TARGET_DIR" ]; then
              echo "Error: pos_system repository directory not found on server."
              exit 1
            fi

            cd "$TARGET_DIR/cloud_server"
            if [ -n "$(docker compose -f docker-compose.prod.yml ps -q db 2>/dev/null)" ]; then
              mkdir -p backups
              docker compose -f docker-compose.prod.yml exec -T db sh -c 'pg_dump -U "$POSTGRES_USER" "$POSTGRES_DB"' > "backups/pre_deploy_backup_$(date +%F_%H%M%S).sql" || echo "Backup failed"
            fi

            cd "$TARGET_DIR"
            git fetch origin main
            git reset --hard origin/main
            cd cloud_server
            if [ -f .env ]; then
              export $(grep -v '^#' .env | xargs 2>/dev/null)
            fi
            docker compose -f docker-compose.prod.yml up -d --build --remove-orphans
            echo "=== DOCKER COMPOSE PS ==="
            docker compose -f docker-compose.prod.yml ps
            echo "=== CLOUDFLARED LOGS ==="
            docker compose -f docker-compose.prod.yml logs --tail=20 cloudflared
            docker image prune -f
