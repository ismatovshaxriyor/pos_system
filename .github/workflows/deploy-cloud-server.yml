name: Deploy cloud_server (Ona)

# cloud_server/** ostida biror narsa main'ga push qilinganda EC2'dagi
# production instansiyani yangilaydi - shu path filtri bo'lmasa,
# local_server'dagi o'zgarishlar ham kerak bo'lmagan deploy'ni
# ishga tushirar edi (ikkala loyiha mustaqil, CLAUDE.md'ga qarang).
on:
  push:
    branches: [main]
    paths:
      - "cloud_server/**"
      - ".github/workflows/deploy-cloud-server.yml"
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Start services and run tests
        run: |
          cd cloud_server
          docker compose -f docker-compose.yml up -d db redis
          sleep 10
          docker compose -f docker-compose.yml run --rm web python manage.py makemigrations --check --dry-run
          docker compose -f docker-compose.yml run --rm web python manage.py test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ~/pos_system/cloud_server
            if docker compose -f docker-compose.prod.yml ps -q db > /dev/null 2>&1; then
              mkdir -p backups
              docker compose -f docker-compose.prod.yml exec -T db pg_dump -U $${DB_USER:-cloud_user} $${DB_NAME:-pos_cloud_db} > backups/pre_deploy_backup_$$(date +%F_%H%M%S).sql || echo "Backup failed"
            fi
            cd ~/pos_system
            git fetch origin main
            git reset --hard origin/main
            cd cloud_server
            docker compose -f docker-compose.prod.yml up -d --build
            docker image prune -f
